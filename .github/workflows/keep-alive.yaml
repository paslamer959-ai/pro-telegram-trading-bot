name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # كل 10 دقائق
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  ping:
    name: Ping Render Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Send ping to Render
        run: |
          echo "🔄 Pinging Render server at $(date)"
          echo "-----------------------------------"
          
          # Ping الصفحة الرئيسية
          echo "Pinging main page..."
          curl -I https://trading-os-bot.onrender.com
          echo ""
          
          # Ping مسار الصحة
          echo "Pinging health endpoint..."
          curl -I https://trading-os-bot.onrender.com/health
          echo ""
          
          echo "✅ Ping completed at $(date)"
          echo "-----------------------------------"