<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading OS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .active-page { display: block; }
        .card-custom { background: #1e2329; border: 1px solid #2b3139; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .signal-buy { color: #02c076; font-weight: bold; }
        .signal-sell { color: #f84960; font-weight: bold; }
        .progress { height: 6px; background: #2b3139; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1e2329; display: flex; padding: 10px 0; border-top: 1px solid #2b3139; }
        .nav-btn { flex: 1; text-align: center; color: #848e9c; cursor: pointer; font-size: 0.9rem; }
        .nav-btn.active { color: #f0b90b; }
        .btn-action { background: #f0b90b; color: black; border: none; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; }
        input { background: #2b3139 !important; border: 1px solid #474d57 !important; color: white !important; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active-page">
        <h5 class="mb-3">📈 رادار السوق</h5>
        <div id="market-list"></div>
    </div>

    <div id="page-run" class="page">
        <h5 class="mb-3">🚀 تشغيل البوت</h5>
        <div class="card-custom">
            <label class="small text-secondary">اختر العملة</label>
            <select id="run-sym" class="form-control mt-1"><option>BTC/USDT</option><option>AR/USDT</option><option>ETH/USDT</option></select>
            <label class="small text-secondary mt-2">رصيد التداول</label>
            <input type="number" id="run-amt" class="form-control" placeholder="0.00">
            <button class="btn-action mt-2" onclick="startBot()">بدء التداول الآن</button>
        </div>
        <div class="card-custom text-center">
            <div class="text-secondary small">أرباح البوت الحالية</div>
            <div id="bot-pnl" class="h3 mt-1 text-success">0.00$</div>
        </div>
    </div>

    <div id="page-set" class="page">
        <h5 class="mb-3">⚙️ الإعدادات السرية</h5>
        <div class="card-custom">
            <input type="password" id="set-key" class="form-control" placeholder="API Key">
            <input type="password" id="set-sec" class="form-control" placeholder="API Secret">
            <button class="btn-action" onclick="saveKeys()">حفظ المفاتيح للأبد</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-btn active" onclick="nav('home')">📊 السوق</div>
        <div class="nav-btn" onclick="nav('run')">⚡ التشغيل</div>
        <div class="nav-btn" onclick="nav('set')">⚙️ الإعدادات</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user.id;

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active-page');
            event.currentTarget.classList.add('active');
        }

        async function loadMarket() {
            const res = await fetch(`/api/market-scan/${uid}`);
            const data = await res.json();
            let html = '';
            data.results.forEach(r => {
                const isUp = r.change > 0;
                html += `
                <div class="card-custom">
                    <div class="d-flex justify-content-between">
                        <span>${r.symbol} ${isUp ? '🔼' : '🔽'}</span>
                        <span class="${isUp ? 'text-success' : 'text-danger'}">${r.price}</span>
                    </div>
                    <div class="progress mt-2"><div class="progress-bar ${isUp ? 'bg-success' : 'bg-danger'}" style="width: ${Math.abs(r.change) * 10}%"></div></div>
                    <div class="d-flex justify-content-between mt-2 small">
                        <span class="${r.signal == 'BUY' ? 'signal-buy' : 'signal-sell'}">إشارة: ${r.signal}</span>
                        <span>RSI: ${r.rsi}</span>
                    </div>
                </div>`;
            });
            document.getElementById('market-list').innerHTML = html;
            document.getElementById('bot-pnl').innerText = data.balance + "$";
        }

        async function saveKeys() {
            const body = { telegramId: uid.toString(), apiKey: document.getElementById('set-key').value, apiSecret: document.getElementById('set-sec').value };
            await fetch('/api/save-keys', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            tg.showAlert("✅ تم حفظ المفاتيح بنجاح!");
        }

        async function startBot() {
            const body = { telegramId: uid.toString(), symbol: document.getElementById('run-sym').value, amount: document.getElementById('run-amt').value };
            await fetch('/api/start-bot', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            tg.showAlert("🚀 البوت بدأ العمل على " + body.symbol);
            nav('home');
        }

        setInterval(loadMarket, 10000);
        loadMarket();
    </script>
</body>
</html>
