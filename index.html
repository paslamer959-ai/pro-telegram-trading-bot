<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; border-top: 1px solid #334155; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 12px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: #3b82f6; border-top: 2px solid #3b82f6; }
    </style>
</head>
<body>
    <div id="homePage" class="page active-page">
        <h3>📊 مراقبة السوق</h3>
        <div class="card"><p>البوت يعمل الآن في الخلفية ✅</p></div>
    </div>
    <div id="tradePage" class="page">
        <h3>📈 إعدادات التداول</h3>
        <div class="card">
            <select id="exchangeId">
                <option value="bingx">BingX</option>
                <option value="binance">Binance</option>
                <option value="mexc">MEXC</option>
            </select>
            <input type="text" id="symbol" placeholder="العملة مثلاً BTC/USDT">
            <input type="number" id="amount" placeholder="المبلغ بـ USDT">
            <select id="strategy">
                <option value="RSI">استراتيجية RSI</option>
                <option value="Scalping">مضاربة (Scalping)</option>
            </select>
            <input type="text" id="apiKey" placeholder="API Key">
            <input type="password" id="apiSecret" placeholder="API Secret">
        </div>
        <button onclick="saveConfig()">🚀 حفظ وتشغيل</button>
    </div>
    <div class="nav">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠<br>الرئيسية</div>
        <div class="nav-item" onclick="showPage('tradePage', this)">📈<br>التداول</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        async function saveConfig() {
            const data = {
                telegramId: tg.initDataUnsafe.user.id,
                exchangeId: document.getElementById('exchangeId').value,
                apiKey: document.getElementById('apiKey').value,
                apiSecret: document.getElementById('apiSecret').value,
                symbol: document.getElementById('symbol').value,
                amount: document.getElementById('amount').value,
                strategy: document.getElementById('strategy').value
            };
            const res = await fetch('/save-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("✅ تم التفعيل بنجاح!");
        }
    </script>
</body>
</html>
