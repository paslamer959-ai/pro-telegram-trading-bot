<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; padding: 15px; }
        .stat-card { background: #1e293b; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #334155; margin-bottom: 10px; }
        .val { font-size: 1.2rem; font-weight: bold; display: block; }
        .profit { color: #10b981; }
        .loss { color: #ef4444; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        input, select { background: #0f172a !important; color: white !important; border: 1px solid #475569 !important; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row g-2 mb-3">
            <div class="col-6"><div class="stat-card"><small>الرصيد</small><span id="bal" class="val">0.00</span></div></div>
            <div class="col-6"><div class="stat-card"><small>إجمالي الربح</small><span id="totalPnl" class="val profit">0.00%</span></div></div>
            <div class="col-12"><div class="stat-card"><small>حالة السوق</small><span id="marketStatus" class="val">جاري الفحص...</span></div></div>
        </div>

        <div class="card">
            <h6>⚙️ الإعدادات</h6>
            <select id="exch" class="form-select"><option value="bingx">BingX</option></select>
            <input type="password" id="key" class="form-control" placeholder="API Key">
            <input type="password" id="sec" class="form-control" placeholder="API Secret">
            <input type="text" id="sym" class="form-control" placeholder="BTC/USDT">
            <input type="number" id="amt" class="form-control" placeholder="المبلغ">
            <button class="btn btn-primary w-100" onclick="save()">حفظ وتشغيل 🚀</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        async function load() {
            const id = tg.initDataUnsafe.user.id;
            const res = await fetch(`/get-config/${id}`);
            const data = await res.json();
            if(data.apiKey) {
                document.getElementById('key').value = data.apiKey;
                document.getElementById('sym').value = data.symbol;
                document.getElementById('amt').value = data.amount;
                document.getElementById('totalPnl').innerText = data.totalProfit.toFixed(2) + "%";
                if(data.totalProfit < 0) document.getElementById('totalPnl').className = "val loss";
            }
            const balRes = await fetch(`/get-balance/${id}`);
            const balData = await balRes.json();
            document.getElementById('bal').innerText = balData.balance + " USDT";
        }
        async function save() {
            const data = {
                telegramId: tg.initDataUnsafe.user.id.toString(),
                apiKey: document.getElementById('key').value,
                apiSecret: document.getElementById('sec').value,
                symbol: document.getElementById('sym').value.toUpperCase(),
                amount: parseFloat(document.getElementById('amt').value),
                exchangeId: document.getElementById('exch').value,
                active: true
            };
            await fetch('/save-config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("تم التفعيل!");
            location.reload();
        }
        load();
    </script>
</body>
</html>
